name: TwinCAT Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, windows, twincat]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build TwinCAT solution
        run: |
          powershell -ExecutionPolicy Bypass -File "C:\actions-runner\scripts\build-twincat.ps1"

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: C:\actions-runner\logs\AUT_Utilities\BuildLog_*.txt

      - name: Upload Boot Project
        uses: actions/upload-artifact@v4
        with:
          name: boot-project
          path: C:\TwinCAT projects\AUT_Utilities\_Boot\

      - name: Upload TE1200 Light SARIF
        uses: actions/upload-artifact@v4
        with:
          name: te1200-sarif
          path: C:\actions-runner\logs\AUT_Utilities\StaticAnalysis_*.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: C:\actions-runner\logs\AUT_Utilities\StaticAnalysis_*.sarif

