name: TwinCAT Build & Test

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, windows, twincat]
    steps:
      - name: Cleanup Visual Studio processes
        run: |
          # Kill any ghost devenv processes that might lock the .vs folder
          Get-Process devenv -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process TcCIBuilder -ErrorAction SilentlyContinue | Stop-Process -Force
        shell: powershell

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false # Opzionale: evita che GitHub provi a cancellare tutto se fallisce

      - name: Execute TcCIBuilder
        shell: pwsh
        run: |
          # Define paths
          $toolPath = "C:\actions-runner\_tools\TcCIBuilder\TcCIBuilder.exe"
          $solutionPath = "${{ github.workspace }}\AUT_Utilities.sln"
          
          # Execute the C# tool with parameters
          # Syntax: tool.exe <slnPath> <config> <platform>
          & $toolPath "$solutionPath" "Release" "TwinCAT OS (x64)"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          # Since your C# tool writes to Console, GitHub Actions captures it.
          # If your tool also saves a file, point to that path here.
          path: ${{ github.workspace }}\*.log 

      - name: Upload Boot Project
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: boot-project
          # Update this path to where TwinCAT generates the boot folder
          path: ${{ github.workspace }}\_Boot\
