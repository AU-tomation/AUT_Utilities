name: TwinCAT Build and Test

on: [push]

jobs:
  build:
    runs-on: self-hosted  # Questo istruisce GitHub ad usare il runner sul tuo PC
    
    steps:
      - name: Checkout PLC Project
        uses: actions/checkout@v4

      - name: Run Automation Tool
        run: |
          # Usa il percorso assoluto dove hai compilato il tuo tool sul PC
          $toolPath = "C:\actions-runner\_tools\TcCIBuilder\TcCIBuilder.exe"
          
          # ${{ github.workspace }} punta alla cartella dove il runner ha clonato il repo TwinCAT
          $solutionPath = "${{ github.workspace }}\AUT_Utilities.sln"
          
          # Esecuzione del tool
          & $toolPath $solutionPath "Release" "TwinCAT OS (x64)"
