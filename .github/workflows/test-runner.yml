name: TwinCAT Build & Test

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, windows, twincat]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false 

      - name: Execute TcCIBuilder
        shell: powershell
        run: |
          $toolPath = "C:\actions-runner\_tools\TcCIBuilder\TcCIBuilder.exe"
          $solutionPath = "${{ github.workspace }}\AUT_Utilities.sln"
          
          # Usiamo Tee-Object per sdoppiare l'output: lo vedi nel log di GitHub 
          # e viene salvato nel file build.log richiesto per l'artifact
          & $toolPath "$solutionPath" "Release" "TwinCAT OS (x64)" | Tee-Object -FilePath "build.log"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log 

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcunit-results
          # Questo è il file che il tuo C# copia alla fine !
          path: ${{ github.workspace }}\TcUnit_Results.xml

       - name: Publish Test Report (UI)
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          # Cerca il file generato e crea la tabella grafica su GitHub
          report_paths: '**/TcUnit_Results.xml'
          check_name: 'TcUnit Execution Report'

     - name: Upload Boot Project
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: boot-project
          # Percorso reale dei file di boot per il runtime UMRT Default
          path: C:\ProgramData\Beckhoff\TwinCAT\3.1\Runtimes\UmRT_Default\3.1\Boot\**
