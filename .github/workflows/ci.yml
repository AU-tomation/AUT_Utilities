name: TwinCAT Build & Test

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, windows, twincat]
    permissions:
      contents: write        # necessario per push su gh-pages
      checks: write          # necessario per il report UI
      security-events: write # necessario per Code Scanning SARIF
      actions: read          # necessario per CodeQL upload-sarif telemetry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Execute TcCIBuilder
        shell: powershell
        run: |
          $toolPath = "C:\actions-runner\_tools\TcCIBuilder\TcCIBuilder.exe"
          $solutionPath = "${{ github.workspace }}\AUT_Utilities.sln"
          & $toolPath "$solutionPath" "Release" "TwinCAT OS (x64)" | Tee-Object -FilePath "build.log"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "TcCIBuilder failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log

      - name: Upload Test Results XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcunit-results
          path: ${{ github.workspace }}\TcUnit_Results.xml

      - name: Publish Test Report UI
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/TcUnit_Results.xml'
          check_name: 'TcUnit Execution Report'
          include_passed: true
          annotate_only: false
          detailed_summary: true

      - name: Upload Static Analysis Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis
          path: ${{ github.workspace }}\*.sarif.json

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}\AUT_Utilities.sarif.json
          category: twincat-static-analysis

      - name: Upload Boot Project
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: boot-project
          path: C:\ProgramData\Beckhoff\TwinCAT\3.1\Runtimes\UmRT_Default\3.1\Boot\**

      - name: Deploy documentation to gh-pages
        if: success()
        shell: powershell
        run: |
          $docsSource = "${{ github.workspace }}\docs"
          $tmpDir = "C:\actions-runner\_work\_gh_pages_tmp"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $repoUrl = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Pulisci e ricrea la cartella temporanea
          if (Test-Path $tmpDir) { Remove-Item $tmpDir -Recurse -Force }
          New-Item $tmpDir -ItemType Directory | Out-Null

          # Clona solo gh-pages nella cartella temporanea
          $branchExists = git ls-remote --heads origin gh-pages
          if ($branchExists) {
            git clone --branch gh-pages --single-branch $repoUrl $tmpDir
          } else {
            git clone $repoUrl $tmpDir
            Set-Location $tmpDir
            git checkout --orphan gh-pages
            git rm -rf . 2>$null
            Set-Location "${{ github.workspace }}"
          }

          # Copia SOLO i docs nella cartella temporanea
          Copy-Item -Path "$docsSource\*" -Destination $tmpDir -Recurse -Force

          Set-Location $tmpDir
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.autocrlf false

          git add -A
          $status = git status --porcelain
          if ($status) {
            git commit -m "docs: update documentation from $sha"
            git push origin gh-pages
            Write-Host "Documentation deployed to gh-pages."
          } else {
            Write-Host "No documentation changes to deploy."
          }

          Set-Location "${{ github.workspace }}"
          Remove-Item $tmpDir -Recurse -Force

      - name: Publish Library Releases
        if: success()
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $compiledLibraries = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Filter "*.compiled-library"

          if (-not $compiledLibraries) {
            Write-Host "No .compiled-library files found — skipping release publishing."
            exit 0
          }

          foreach ($lib in $compiledLibraries) {
            $libName = $lib.BaseName

            # Find the .plcproj in the same folder to read the version
            $plcprojFile = Get-ChildItem -Path $lib.DirectoryName -Filter "*.plcproj" | Select-Object -First 1
            if (-not $plcprojFile) {
              Write-Warning "No .plcproj found alongside $($lib.Name) — skipping."
              continue
            }

            [xml]$plcproj = Get-Content $plcprojFile.FullName
            $version = $plcproj.SelectSingleNode("//*[local-name()='ProjectVersion']").InnerText
            if (-not $version) {
              Write-Warning "ProjectVersion not found in $($plcprojFile.Name) — skipping."
              continue
            }

            $tag = "$libName-v$version"
            Write-Host "Publishing: $tag -> $($lib.Name)"

            # Create release only if it does not exist yet
            gh release view $tag --json tagName 2>$null | Out-Null
            if ($LASTEXITCODE -ne 0) {
              gh release create $tag `
                --title "$libName v$version" `
                --notes "Automated release built from commit ${{ github.sha }}."
            }

            # Upload (or overwrite) the .compiled-library asset
            gh release upload $tag "$($lib.FullName)" --clobber
            Write-Host "Done: $tag"
          }